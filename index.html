<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無脊椎動物分類小考（50 題）</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{font-family:Arial,sans-serif;background:#eef3f8;margin:0;}
.wrap{max-width:900px;margin:20px auto;background:#fff;padding:20px;border-radius:16px;}
img{max-width:100%;border-radius:12px;margin-bottom:10px;}
button{margin:5px;padding:10px;border-radius:8px;cursor:pointer;width:48%;}
#nextBtn,#downloadBtn{width:100%;margin-top:10px;}
#downloadBtn{background:#4CAF50;color:white;}
input{padding:6px;width:200px;}
</style>
</head>

<body>
<div class="wrap">

<h2>無脊椎動物分類小考（50 題）</h2>
<p>總分：<span id="score">0</span> / 100</p>
<p>進度：<span id="count">0</span> / 50</p>

<div style="display:flex; justify-content:space-between;">
<div>
Student ID:
<input type="text" id="studentID" placeholder="Enter your Student ID">
</div>

<div id="scoreBox" style="border:3px solid #4CAF50;padding:10px;border-radius:10px;background:#fff;font-weight:bold;">
Score Summary<br>ID: -<br>Latest: 0<br>Best: 0
</div>
</div>

<img id="img">
<p id="q"></p>
<div id="ops"></div>
<p id="res"></p>

<button id="nextBtn" onclick="next()" disabled>下一題</button>
<button id="downloadBtn" onclick="downloadCertificate()">下載成績單 PNG</button>

</div>

<!-- 證書 -->
<div id="certificate" style="position:absolute;left:-9999px;width:600px;padding:30px;background:white;border:3px solid black;">
<h2 style="text-align:center;">Invertebrate Biology Quiz Certificate</h2>
<hr>
<p id="certID"></p>
<p id="certScore"></p>
<p id="certDate"></p>
</div>

<script>

// 🔥 換成你的 Apps Script URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5t3_gQKDsQxmg0K9M54wUe8fE6DGH5_Aphhywc9_aH2mnOC3XycjaHusT6VIE5KNvMw/exec";

// ===== 題庫 =====
const categories = ["Porifera","Cnidaria","Echinodermata","Platyhelminthes","Mollusca","Annelida","Nematoda","Arthropoda"];
let Q=[];
categories.forEach(cat=>{
for(let i=1;i<=9;i++){
Q.push({img:`images/${cat}_${i}.jpg`,q:"此生物分類？",ops:categories,ans:categories.indexOf(cat)});
}});

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

let pool = shuffle([...Q]).slice(0,50);
let i=0,score=0;

function updateScoreBox(latest,best){
let id=document.getElementById("studentID").value||"-";
document.getElementById("scoreBox").innerHTML=`Score Summary<br>ID:${id}<br>Latest:${latest}<br>Best:${best}`;
}

function checkID(){
let id=document.getElementById("studentID").value.trim();
if(!id){alert("請輸入 Student ID");return false;}
return true;
}

function load(){
let q=pool[i];
img.src=q.img;
qEl.innerText=q.q;
ops.innerHTML="";
res.innerText="";
nextBtn.disabled=true;

q.ops.forEach((o,idx)=>{
let b=document.createElement("button");
b.innerText=o;
b.onclick=()=>{if(checkID())check(idx)};
ops.appendChild(b);
});

count.innerText=i+1;
}

function check(idx){
let q=pool[i];
if(idx===q.ans){score+=2;res.innerText="✔";}
else{res.innerText="✘";}
scoreEl.innerText=score;
document.querySelectorAll("#ops button").forEach(b=>b.disabled=true);
nextBtn.disabled=false;
}

function next(){
i++;
if(i>=50){

let id=document.getElementById("studentID").value.trim();
let prev=parseInt(localStorage.getItem(id+"_best")||0);
let best = score>prev?score:prev;

localStorage.setItem(id+"_best",best);
updateScoreBox(score,best);

// 🔥 自動上傳
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({studentID:id,latest:score,best:best})
});

alert(`完成！分數:${score}`);

i=0;score=0;pool=shuffle([...Q]).slice(0,50);
}
load();
}

// ===== 下載證書 =====
function downloadCertificate(){
let id=studentID.value.trim();
let best=parseInt(localStorage.getItem(id+"_best"));
if(!id||!best){alert("無資料");return;}

let date=new Date().toISOString().split("T")[0];
certID.innerText="Student ID: "+id;
certScore.innerText="Score: "+best+"/100";
certDate.innerText="Date: "+date;

html2canvas(certificate).then(c=>{
let a=document.createElement("a");
a.download=`${id}_${best}_certificate.png`;
a.href=c.toDataURL();
a.click();
});
}

// init
updateScoreBox(0,0);
load();

</script>
</body>
</html>
