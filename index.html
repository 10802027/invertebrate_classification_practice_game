<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無脊椎動物分類小考（八選一 50 題）</title>
<style>
body{font-family:Arial,sans-serif;background:#eef3f8;margin:0;}
.wrap{max-width:900px;margin:20px auto;background:#fff;padding:20px;border-radius:16px;}
img{max-width:100%;border-radius:12px;margin-bottom:10px;}
button{margin:5px;padding:10px;border-radius:8px;cursor:pointer;width:48%;}
h2,h3{margin-bottom:10px;}
#ops button{width:48%; display:inline-block;}
#nextBtn{width:100%;margin-top:10px;}
#exportBtn{width:100%;margin-top:10px;background:#4CAF50;color:white;}
</style>
</head>
<body>

<div class="wrap">
<h2>無脊椎動物分類小考（八選一 50 題）</h2>
<p>總分計算：<span id="score">0</span> / 100</p>
<p>答題進度：<span id="count">0</span> / 50</p>
<p>Student ID: <input type="text" id="studentID" placeholder="Enter your Student ID"></p>

<img id="img">
<p id="q"></p>
<div id="ops"></div>
<p id="res" style="font-weight:bold;"></p>
<p id="exp"></p>

<button id="nextBtn" onclick="next()" disabled>下一題</button>
<button id="exportBtn" onclick="exportCSV()">Export CSV（回傳成績）</button>
</div>

<script>
// ===== 題庫 =====
const categories = ["Porifera","Cnidaria","Echinodermata","Platyhelminthes","Mollusca","Annelida","Nematoda","Arthropoda"];
let Q=[];

categories.forEach(cat=>{
    for(let i=1;i<=9;i++){
        Q.push({
            img:`images/${cat}_${i}.jpg`,
            q:`此生物分類？（This animal belongs to which phylum?）`,
            ops:categories,
            ans:categories.indexOf(cat),
            exp:`${cat}`
        });
    }
});

// ===== 隨機 =====
function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}
let pool = shuffle([...Q]).slice(0,50);

let i=0,score=0;
let bestScore=0;

// ===== 載入題目 =====
function load(){
    const q = pool[i];
    document.getElementById("img").src = q.img;
    document.getElementById("q").innerText = q.q;
    document.getElementById("ops").innerHTML = "";
    document.getElementById("res").innerText = "";
    document.getElementById("exp").innerText = "";
    document.getElementById("nextBtn").disabled = true;

    q.ops.forEach((o,idx)=>{
        let b=document.createElement("button");
        b.innerText = o;
        b.onclick = ()=>check(idx);
        document.getElementById("ops").appendChild(b);
    });

    document.getElementById("count").innerText = i+1;
}

// ===== 作答 =====
function check(idx){
    const q = pool[i];
    if(idx===q.ans){
        score += 2;
        document.getElementById("res").innerText = "✔ 正確 Correct";
    } else {
        document.getElementById("res").innerText = "✘ 錯誤 Wrong";
    }
    document.getElementById("exp").innerText = q.exp;
    document.getElementById("score").innerText = score;

    document.querySelectorAll("#ops button").forEach(b=>b.disabled=true);
    document.getElementById("nextBtn").disabled = false;
}

// ===== 下一題 =====
function next(){
    i++;
    if(i>=pool.length){

        alert(`測驗完成！\n你的分數：${score}/100`);

        const student = document.getElementById("studentID").value.trim();
        if(!student){
            alert("請先輸入 Student ID 才能儲存成績！");
        } else {

            let prev = parseInt(localStorage.getItem(student+"_bestScore") || 0);

            if(score > prev){
                let save = confirm(`新高分 ${score} 分！是否覆蓋原本最佳成績 (${prev})？`);
                if(save){
                    localStorage.setItem(student+"_bestScore",score);
                    bestScore = score;
                }
            } else {
                alert(`本次分數 ${score} 未超過最佳分數 ${prev}`);
                bestScore = prev;
            }
        }

        // 重置
        i=0;
        score=0;
        pool = shuffle([...Q]).slice(0,50);
    }
    load();
}

// ===== 匯出 CSV =====
function exportCSV(){
    const student = document.getElementById("studentID").value.trim();
    if(!student){
        alert("請輸入 Student ID");
        return;
    }

    let best = localStorage.getItem(student+"_bestScore");
    if(!best){
        alert("尚未完成測驗或沒有紀錄");
        return;
    }

    let now = new Date().toISOString();
    let csv = "StudentID,DateTime,BestScore\n";
    csv += `${student},${now},${best}\n`;

    let blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `${student}.csv`;
    link.click();

    alert("成績已匯出（最佳分數）！");
}

// ===== 初始 =====
load();
</script>

</body>
</html>
