<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無脊椎動物分類小考（50 題）</title>

<!-- html2canvas -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{font-family:Arial,sans-serif;background:#eef3f8;margin:0;}
.wrap{max-width:900px;margin:20px auto;background:#fff;padding:20px;border-radius:16px;}
img{max-width:100%;border-radius:12px;margin-bottom:10px;}
button{margin:5px;padding:10px;border-radius:8px;cursor:pointer;width:48%;}
#ops button{width:48%; display:inline-block;}
#nextBtn{width:100%;margin-top:10px;}
#downloadBtn{width:100%;margin-top:10px;background:#4CAF50;color:white;}
</style>
</head>

<body>

<div class="wrap">

<h2>無脊椎動物分類小考（50 題）</h2>
<p>總分：<span id="score">0</span> / 100</p>
<p>進度：<span id="count">0</span> / 50</p>

<!-- 🔹 上方資訊列 -->
<div style="display:flex; justify-content:space-between; align-items:center;">

<div>
Student ID:
<input type="text" id="studentID" placeholder="Enter your Student ID">
</div>

<!-- 🔥 成績框（可截圖） -->
<div id="scoreBox" style="
border:3px solid #4CAF50;
padding:10px;
border-radius:10px;
background:#fff;
box-shadow:0 0 10px rgba(0,0,0,0.2);
font-weight:bold;
min-width:200px;
">
Score Summary<br>
ID: -<br>
Latest: 0<br>
Best: 0
</div>

</div>

<img id="img">
<p id="q"></p>
<div id="ops"></div>
<p id="res" style="font-weight:bold;"></p>
<p id="exp"></p>

<button id="nextBtn" onclick="next()" disabled>下一題</button>
<button id="downloadBtn" onclick="downloadPNG()">下載成績證明 PNG</button>

</div>

<script>

// ===== 題庫 =====
const categories = ["Porifera","Cnidaria","Echinodermata","Platyhelminthes","Mollusca","Annelida","Nematoda","Arthropoda"];
let Q=[];

categories.forEach(cat=>{
    for(let i=1;i<=9;i++){
        Q.push({
            img:`images/${cat}_${i}.jpg`,
            q:`此生物分類？（This animal belongs to which phylum?）`,
            ops:categories,
            ans:categories.indexOf(cat),
            exp:`${cat}`
        });
    }
});

// ===== 工具 =====
function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}

// ===== 初始化 =====
let pool = shuffle([...Q]).slice(0,50);
let i=0,score=0;

// ===== 更新右上角成績框 =====
function updateScoreBox(latest, best){
    const student = document.getElementById("studentID").value || "-";
    document.getElementById("scoreBox").innerHTML = `
        Score Summary<br>
        ID: ${student}<br>
        Latest: ${latest}<br>
        Best: ${best}
    `;
}

// ===== 載入題目 =====
function load(){
    const q = pool[i];
    document.getElementById("img").src = q.img;
    document.getElementById("q").innerText = q.q;
    document.getElementById("ops").innerHTML = "";
    document.getElementById("res").innerText = "";
    document.getElementById("exp").innerText = "";
    document.getElementById("nextBtn").disabled = true;

    q.ops.forEach((o,idx)=>{
        let b=document.createElement("button");
        b.innerText = o;
        b.onclick = ()=>check(idx);
        document.getElementById("ops").appendChild(b);
    });

    document.getElementById("count").innerText = i+1;
}

// ===== 作答 =====
function check(idx){
    const q = pool[i];
    if(idx===q.ans){
        score += 2;
        document.getElementById("res").innerText = "✔ 正確 Correct";
    } else {
        document.getElementById("res").innerText = "✘ 錯誤 Wrong";
    }
    document.getElementById("exp").innerText = q.exp;
    document.getElementById("score").innerText = score;

    document.querySelectorAll("#ops button").forEach(b=>b.disabled=true);
    document.getElementById("nextBtn").disabled = false;
}

// ===== 下一題 =====
function next(){
    i++;

    if(i>=pool.length){

        const student = document.getElementById("studentID").value.trim();

        let prev = 0;
        if(student){
            prev = parseInt(localStorage.getItem(student+"_bestScore") || 0);
        }

        let finalBest = prev;

        if(student){
            if(score > prev){
                let save = confirm(`新高分 ${score} 分！是否覆蓋原本最佳成績 (${prev})？`);
                if(save){
                    localStorage.setItem(student+"_bestScore",score);
                    finalBest = score;
                }
            } else {
                alert(`本次分數 ${score} 未超過最佳分數 ${prev}`);
                finalBest = prev;
            }
        } else {
            alert(`本次分數：${score}（未輸入 Student ID，不會儲存）`);
        }

        // 更新顯示
        updateScoreBox(score, finalBest);

        alert(`測驗完成！\n你的分數：${score}/100`);

        // 重置
        i=0;
        score=0;
        pool = shuffle([...Q]).slice(0,50);
    }

    load();
}

// ===== 🔥 下載成績 PNG =====
function downloadPNG(){

    const student = document.getElementById("studentID").value.trim();
    if(!student){
        alert("請輸入 Student ID");
        return;
    }

    html2canvas(document.getElementById("scoreBox")).then(canvas=>{
        let link = document.createElement("a");
        link.download = `${student}_score.png`;
        link.href = canvas.toDataURL();
        link.click();
    });

}

// 初始化
updateScoreBox(0,0);
load();

</script>

</body>
</html>
