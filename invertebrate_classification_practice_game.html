<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Invertebrate Game</title>
</head>

<body>

<h2>無脊椎動物分類遊戲</h2>

<p id="q"></p>
<div id="ops"></div>

<script>

const Q = [
{
q:"海綿動物屬於？",
ops:["Porifera","Cnidaria","Annelida","Arthropoda"],
ans:0
},
{
q:"具有刺絲胞？",
ops:["Porifera","Cnidaria","Mollusca","Annelida"],
ans:1
}
];

let i = 0;

function load(){
  let q = Q[i];
  document.getElementById("q").innerText = q.q;

  let ops = document.getElementById("ops");
  ops.innerHTML = "";

  for(let j=0;j<q.ops.length;j++){
    let b = document.createElement("button");
    b.innerText = q.ops[j];
    b.onclick = function(){
      if(j===q.ans){alert("✔ 正確")}
      else{alert("✘ 錯誤")}
    };
    ops.appendChild(b);
  }
}

load();

</script>

</body>
</html>
