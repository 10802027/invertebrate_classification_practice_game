<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invertebrate Body Plan Quiz - Student Version</title>
<style>
body{font-family:Arial,sans-serif;background:#eef3f8;margin:0;}
.wrap{max-width:900px;margin:20px auto;background:#fff;padding:20px;border-radius:16px;}
img{max-width:100%;border-radius:12px;margin-bottom:10px;}
button{margin:5px;padding:10px;border-radius:8px;cursor:pointer;width:48%;}
#nextBtn{width:100%;margin-top:10px;}
input{padding:5px;width:200px;margin-bottom:10px;}
</style>
</head>
<body>
<div class="wrap">
<h2>無脊椎動物特徵小考（三選一 25 題）</h2>
<p>Student ID: <input type="text" id="studentID" placeholder="Enter your Student ID"></p>
<p>Score: <span id="score">0</span> / 100</p>
<p>Question: <span id="count">0</span> / 25</p>

<img id="img">
<p id="q">請根據圖片判斷其特徵？（Based on the image, identify its characteristics.）</p>
<div id="ops"></div>
<p id="res" style="font-weight:bold;"></p>

<button id="nextBtn" onclick="next()" disabled>Next</button>
</div>

<script>
// ===== Body Plan Features =====
const bodyplan_features = {
    "Porifera": {Sym:"Asymmetry",Coelom:"Acoelomates",Germ:"Not belonging",Dev:"Not belonging"},
    "Cnidaria": {Sym:"Radial",Coelom:"Acoelomates",Germ:"Diploblasty",Dev:"Not belonging"},
    "Platyhelminthes": {Sym:"Bilateral",Coelom:"Acoelomates",Germ:"Triploblasty",Dev:"Protostome"},
    "Nematoda": {Sym:"Bilateral",Coelom:"Pseudocoelomates",Germ:"Triploblasty",Dev:"Protostome"},
    "Annelida": {Sym:"Bilateral",Coelom:"Coelomates",Germ:"Triploblasty",Dev:"Protostome"},
    "Mollusca": {Sym:"Bilateral",Coelom:"Coelomates",Germ:"Triploblasty",Dev:"Protostome"},
    "Arthropoda": {Sym:"Bilateral",Coelom:"Coelomates",Germ:"Triploblasty",Dev:"Protostome"},
    "Echinodermata": {Sym:"Radial",Coelom:"Coelomates",Germ:"Triploblasty",Dev:"Deuterostome"}
};

// ===== Helper Functions =====
function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}

// ===== Generate Question Pool =====
let Q=[];
const categories = Object.keys(bodyplan_features);
const counts = [3,3,3,3,3,3,3,4]; // total 25 questions
categories.forEach((cat,idx)=>{
    let num = counts[idx];
    let indices = shuffle([...Array(9).keys()].map(x=>x+1)).slice(0,num);
    indices.forEach(i=>{
        Object.keys(bodyplan_features[cat]).forEach(fk=>{
            let correct = bodyplan_features[cat][fk];
            let all = [];
            if(fk==="Sym") all=["Radial","Bilateral","Asymmetry"];
            if(fk==="Coelom") all=["Coelomates","Pseudocoelomates","Acoelomates"];
            if(fk==="Germ") all=["Diploblasty","Triploblasty","Not belonging"];
            if(fk==="Dev") all=["Protostome","Deuterostome","Not belonging"];
            let ops = shuffle(all);
            Q.push({
                img:`images/${cat}_${i}.jpg`,
                q:"請根據圖片判斷其特徵？（Based on the image, identify its characteristics.）",
                ops: ops,
                ans: ops.indexOf(correct),
                type: fk,
                exp:`Correct answer: ${correct}`
            });
        });
    });
});

// 隨機選 25 題
let pool = shuffle(Q).slice(0,25);

let i=0,score=0;
let resultLog=[];

// ===== Load Question =====
function load(){
    const q = pool[i];
    document.getElementById("img").src = q.img;
    document.getElementById("q").innerText = q.q;
    document.getElementById("ops").innerHTML = "";
    document.getElementById("res").innerText = "";
    document.getElementById("nextBtn").disabled = true;

    q.ops.forEach((o,idx)=>{
        let b=document.createElement("button");
        b.innerText = o;
        b.onclick = ()=>check(idx);
        document.getElementById("ops").appendChild(b);
    });
    document.getElementById("count").innerText = i+1;
}

// ===== Check Answer =====
function check(idx){
    const q = pool[i];
    let correct = idx===q.ans;
    if(correct) score +=4;
    document.getElementById("res").innerText = correct ? "✔ Correct" : "✘ Wrong";
    document.getElementById("score").innerText = score;

    resultLog.push({Question:i+1,Image:q.img,Answer:q.ops[q.ans],Selected:q.ops[idx],Correct:correct,Score:correct?4:0,Type:q.type});

    document.querySelectorAll("#ops button").forEach(b=>b.disabled=true);
    document.getElementById("nextBtn").disabled=false;
}

// ===== Next Question =====
function next(){
    i++;
    if(i>=pool.length){
        alert(`Quiz completed!\nYour final score: ${score}/100`);
        // reset for reattempt
        i=0;
        score=0;
        resultLog=[];
        pool = shuffle(Q).slice(0,25);
        load();
    } else load();
}


// 初始載入
load();
</script>
</body>
</html>
