<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無脊椎動物分類進階 Body Plan 測驗</title>
<style>
body{font-family:Arial,sans-serif;background:#eef3f8;margin:0;}
.wrap{max-width:900px;margin:20px auto;background:#fff;padding:20px;border-radius:16px;}
img{max-width:100%;border-radius:12px;margin-bottom:10px;}
button{margin:5px;padding:10px;border-radius:8px;cursor:pointer;width:48%;}
#nextBtn{width:100%;margin-top:10px;}
</style>
</head>
<body>
<div class="wrap">
<h2>無脊椎動物分類進階 Body Plan 測驗（3選1, 25 題）</h2>
<p>分數：<span id="score">0</span> / 100</p>
<p>題目進度：<span id="count">0</span> / 25</p>

<img id="img">
<p id="q"></p>
<div id="ops"></div>
<p id="res" style="font-weight:bold;"></p>
<p id="exp"></p>

<button id="nextBtn" onclick="next()" disabled>下一題</button>
<button id="exportCSV" onclick="exportCSV()">匯出 CSV（老師用）</button>
</div>

<script>
// ===== 題庫設定 =====
const bodyplan_features = {
    "Porifera": {Sym:"No symmetry / 無對稱",Coelom:"Acoelomates / 無體腔",Germ:"Monoloblasty / 單胚層",Dev:"Not belonging / 不屬於"},
    "Cnidaria": {Sym:"Radial symmetry / 放射對稱",Coelom:"Acoelomates / 無體腔",Germ:"Diploblasty / 雙胚層",Dev:"Not belonging / 不屬於"},
    "Platyhelminthes": {Sym:"Bilateral symmetry / 雙側對稱",Coelom:"Acoelomates / 無體腔",Germ:"Triploblasty / 三胚層",Dev:"Protostome / 原口動物"},
    "Nematoda": {Sym:"Bilateral symmetry / 雙側對稱",Coelom:"Pseudocoelomates / 假體腔",Germ:"Triploblasty / 三胚層",Dev:"Protostome / 原口動物"},
    "Annelida": {Sym:"Bilateral symmetry / 雙側對稱",Coelom:"Coelomates / 真體腔",Germ:"Triploblasty / 三胚層",Dev:"Protostome / 原口動物"},
    "Mollusca": {Sym:"Bilateral symmetry / 雙側對稱",Coelom:"Coelomates / 真體腔",Germ:"Triploblasty / 三胚層",Dev:"Protostome / 原口動物"},
    "Arthropoda": {Sym:"Bilateral symmetry / 雙側對稱",Coelom:"Coelomates / 真體腔",Germ:"Triploblasty / 三胚層",Dev:"Protostome / 原口動物"},
    "Echinodermata": {Sym:"Radial symmetry / 放射對稱 (成人)",Coelom:"Coelomates / 真體腔",Germ:"Triploblasty / 三胚層",Dev:"Deuterostome / 後口動物"}
};

// ===== 建立題庫 =====
let Q=[];
const categories = Object.keys(bodyplan_features);
categories.forEach(cat=>{
    for(let i=1;i<=9;i++){
        let feature_keys = Object.keys(bodyplan_features[cat]);
        feature_keys.forEach(fk=>{
            let correct = bodyplan_features[cat][fk];
            // 隨機選2個錯誤答案
            let wrong = [];
            let all = Array.from(new Set(Object.values(bodyplan_features).map(x=>x[fk]))).filter(x=>x!==correct);
            while(wrong.length<2){
                let w = all[Math.floor(Math.random()*all.length)];
                if(!wrong.includes(w)) wrong.push(w);
            }
            let ops = shuffle([correct,...wrong]);
            Q.push({
                img:`images/${cat}_${i}.jpg`,
                q:`請根據圖片判斷其 ${fk}？（Based on the image, identify its ${fk}）`,
                ops: ops,
                ans: ops.indexOf(correct),
                exp:`正確答案: ${correct}`
            });
        });
    }
});

// ===== 隨機抽 25 題 =====
function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}
let pool = shuffle([...Q]).slice(0,25);

let i=0,score=0,total=0;
let resultLog=[];

// ===== 題目載入 =====
function load(){
    const q = pool[i];
    document.getElementById("img").src = q.img;
    document.getElementById("q").innerText = q.q;
    document.getElementById("ops").innerHTML = "";
    document.getElementById("res").innerText = "";
    document.getElementById("exp").innerText = "";
    document.getElementById("nextBtn").disabled = true;

    q.ops.forEach((o,idx)=>{
        let b=document.createElement("button");
        b.innerText = o;
        b.onclick = ()=>check(idx);
        document.getElementById("ops").appendChild(b);
    });
    document.getElementById("count").innerText = i+1;
}

// ===== 作答檢查 =====
function check(idx){
    const q = pool[i];
    let correct = idx===q.ans;
    if(correct) score += 4; // 每題4分
    document.getElementById("res").innerText = correct ? "✔ 正確 Correct" : "✘ 錯誤 Wrong";
    document.getElementById("exp").innerText = q.exp;
    document.getElementById("score").innerText = score;
    document.getElementById("nextBtn").disabled = false;

    resultLog.push({題號:i+1,圖片:q.img,答案:q.ops[q.ans],選擇:q.ops[idx],是否正確:correct,分數:correct?4:0});

    document.querySelectorAll("#ops button").forEach(b=>b.disabled=true);
}

// ===== 下一題 =====
function next(){
    i++;
    if(i>=pool.length){
        alert(`測驗完成！\n你的最終分數：${score}/100`);
    } else load();
}

// ===== 匯出 CSV =====
function exportCSV(){
    if(resultLog.length===0){alert("尚未作答"); return;}
    let csv="題號,圖片,正確答案,學生選擇,是否正確,分數\n";
    resultLog.forEach(r=>{
        csv+=`${r.題號},${r.圖片},${r.答案},${r.選擇},${r.是否正確},${r.分數}\n`;
    });
    let blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "bodyplan_quiz_results.csv";
    link.click();
}

// 初始載入第一題
load();
</script>
</body>
</html>
